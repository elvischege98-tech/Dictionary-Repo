<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary wordly app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>WELCOME TO THE DICTIONARY APP</h1>
<!-- Form for searching words -->
    <form id="search-form">
        <input type="text" name="word" id="word-input" placeholder="Enter a word" required class="search-bar">
        <button type="submit" id="search-button">Search</button>
    </form>

    <!-- Results section -->
    <div id="results" class="results"></div>

    <script src="./script.js"></script>
</body>
</html>
